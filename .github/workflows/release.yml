name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: |
          cmake -B build -DEBLDR_BUILD_TESTS=ON -DEBLDR_HARDENING=ON
          cmake --build build
          ctest --test-dir build --output-on-failure

  cross-compile:
    name: Firmware (${{ matrix.board }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: stm32f4
            pkg: gcc-arm-none-eabi
          - board: stm32h7
            pkg: gcc-arm-none-eabi
          - board: nrf52
            pkg: gcc-arm-none-eabi
          - board: rpi4
            pkg: gcc-aarch64-linux-gnu
          - board: riscv64_virt
            pkg: gcc-riscv64-linux-gnu
          - board: esp32
            pkg: gcc-arm-none-eabi
          - board: x86_64_efi
            pkg: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        if: matrix.pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkg }} || true
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build firmware
        run: |
          cmake -B build -DEBLDR_BOARD=${{ matrix.board }} -DCMAKE_BUILD_TYPE=Release || \
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build || true
          mkdir -p fw
          find build -name "*.a" -o -name "*.bin" -o -name "*.elf" | xargs -I{} cp {} fw/ 2>/dev/null || true
          cp -r include fw/ 2>/dev/null || true
          tar czf eboot-${{ steps.version.outputs.version }}-${{ matrix.board }}.tar.gz -C fw .
      - uses: actions/upload-artifact@v4
        with:
          name: eboot-${{ matrix.board }}
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, cross-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eboot-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum *.tar.gz > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "eBoot ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: |
            *.tar.gz
            SHA256SUMS.txt
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'beta') }}
