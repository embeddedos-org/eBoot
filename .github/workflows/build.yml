name: eBoot Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-host:
    name: Host Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++

      - name: Configure (host, tests enabled)
        run: cmake -B build -DEBLDR_BUILD_TESTS=ON -DEBLDR_BOARD=none

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  build-arm:
    name: Cross-compile STM32F4
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Configure
        run: |
          cmake -B build-arm \
            -DCMAKE_SYSTEM_NAME=Generic \
            -DCMAKE_C_COMPILER=arm-none-eabi-gcc \
            -DEBLDR_BOARD=stm32f4 \
            -DCMAKE_C_FLAGS="-mcpu=cortex-m4 -mthumb -mfloat-abi=hard -mfpu=fpv4-sp-d16 -specs=nosys.specs"

      - name: Build
        run: cmake --build build-arm --parallel

      - name: Report size
        run: arm-none-eabi-size build-arm/*.elf 2>/dev/null || true

  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --error-exitcode=1 \
            core/ hal/ 2>&1 || true
